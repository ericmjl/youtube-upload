name: Run tests on pull requests

on: [pull_request]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    name: Run test suite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=youtube_upload --cov-report=xml

      # https://github.com/codecov/codecov-action
      - name: Upload code coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          verbose: true

  # Verifies that the runtime dependencies in [project] are declared completely:
  # a bare `pip install .` (no dev extras) must succeed and the console script
  # must run.
  bare-install:
    runs-on: ubuntu-latest
    name: Bare installation smoke test

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run CLI as a smoke test
        run: youtube-upload --help
