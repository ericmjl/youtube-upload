repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/jsh9/pydoclint
    rev: 0.3.8
    hooks:
      - id: pydoclint
        args:
          - "--config=pyproject.toml"
# Note: docstring coverage (interrogate) is enforced in CI (code-style.yaml)
# via `uv run interrogate`, not as a pre-commit hook, because interrogate 1.5.0
# imports `pkg_resources` which is absent in pre-commit's isolated Py3.13 env.
